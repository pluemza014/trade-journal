function liveUpdateTab(outcomeVal) {
  modalSession[modalActiveIdx].outcome = outcomeVal;
  const tabs = document.getElementById('trade-tabs');
  if (!tabs) return;
  const tab = tabs.children[modalActiveIdx];
  if (!tab) return;
  tab.classList.remove('tab-win','tab-loss','tab-be');
  tab.classList.add(outcomeVal==='Loss'?'tab-loss':outcomeVal==='BE'?'tab-be':'tab-win');
}

function addScreenshots(input) {
  const files = [...input.files];
  if (!files.length) return;
  const t = modalSession[modalActiveIdx];
  if (!t.screenshots) t.screenshots = [];
  if (!t.screenshotSizes) t.screenshotSizes = [];
  let loaded = 0;
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      t.screenshots.push(e.target.result);
      t.screenshotSizes.push(defaultScreenshotSize());
      if (++loaded === files.length) refreshScreenshotPreview(t);
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function removeScreenshot(idx) {
  const t = modalSession[modalActiveIdx];
  if (!t.screenshots) return;
  t.screenshots.splice(idx, 1);
  if (t.screenshotSizes) t.screenshotSizes.splice(idx, 1);
  refreshScreenshotPreview(t);
}

function ssResizeStart(e, wrap) {
  e.preventDefault();
  e.stopPropagation();
  const startX = e.clientX;
  const startY = e.clientY;
  const startW = wrap.offsetWidth;
  const startH = wrap.offsetHeight;
  const MIN = 100;
  // Constrain to modal inner width
  const modal = document.getElementById('modal-box');
  const MAX_W = modal ? modal.clientWidth - 40 : 660;
  const MAX_H = 600;

  // Find index of this wrap among siblings
  const preview = document.getElementById('screenshot-preview');
  const wraps = preview ? [...preview.querySelectorAll('.ss-wrap')] : [];
  const idx = wraps.indexOf(wrap);

  function onMove(ev) {
    const w = Math.min(MAX_W, Math.max(MIN, startW + ev.clientX - startX));
    const h = Math.min(MAX_H, Math.max(MIN, startH + ev.clientY - startY));
    wrap.style.width  = w + 'px';
    wrap.style.height = h + 'px';
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    // Persist size to session trade
    const t = modalSession[modalActiveIdx];
    if (t && idx >= 0) {
      if (!t.screenshotSizes) t.screenshotSizes = [];
      t.screenshotSizes[idx] = { w: wrap.offsetWidth, h: wrap.offsetHeight };
    }
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

function pasteScreenshot() {
  // Use clipboard API without permission prompt — just read directly
  navigator.clipboard.read().then(items => {
    for (const item of items) {
      const imgType = item.types.find(t => t.startsWith('image/'));
      if (imgType) {
        item.getType(imgType).then(blob => {
          const reader = new FileReader();
          reader.onload = e => pushScreenshot(e.target.result);
          reader.readAsDataURL(blob);
        });
        return;
      }
    }
    toast('No image in clipboard — try Ctrl+V');
  }).catch(() => {
    toast('Press Ctrl+V to paste screenshot');
  });
}

// Also support Ctrl+V paste directly when modal is open
document.addEventListener('paste', e => {
  if (!document.getElementById('modal-overlay')?.style.display || document.getElementById('modal-overlay').style.display === 'none') return;
  const items = [...(e.clipboardData?.items || [])];
  const imgItem = items.find(it => it.type.startsWith('image/'));
  if (!imgItem) return;
  e.preventDefault();
  const blob = imgItem.getAsFile();
  const reader = new FileReader();
  reader.onload = ev => pushScreenshot(ev.target.result);
  reader.readAsDataURL(blob);
});

function defaultScreenshotSize() {
  const modal = document.getElementById('modal-box');
  const w = modal ? modal.clientWidth - 40 : 620;
  return { w, h: Math.round(w * 9/16) }; // 16:9 default height
}

function pushScreenshot(dataUrl) {
  const t = modalSession[modalActiveIdx];
  if (!t) return;
  if (!t.screenshots) t.screenshots = [];
  if (!t.screenshotSizes) t.screenshotSizes = [];
  t.screenshots.push(dataUrl);
  t.screenshotSizes.push(defaultScreenshotSize());
  refreshScreenshotPreview(t);
  toast('Screenshot added');
}

function refreshScreenshotPreview(t) {
  const preview = document.getElementById('screenshot-preview');
  if (!preview) return;
  preview.innerHTML = (t.screenshots||[]).map((src,i) => {
    const sz = (t.screenshotSizes||[])[i] || {w:200, h:130};
    return `<div class="ss-wrap" style="position:relative;width:${sz.w}px;height:${sz.h}px;border-radius:var(--radius);overflow:visible;flex-shrink:0">
      <div style="width:100%;height:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border2);position:relative">
        <img src="${src}" style="width:100%;height:100%;object-fit:cover;display:block;cursor:pointer" onclick="openScreenshot(${i})" title="Click to enlarge">
        <button onclick="removeScreenshot(${i})" style="position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2">×</button>
      </div>
      <div class="ss-resize" onmousedown="ssResizeStart(event,this.parentElement)" style="position:absolute;bottom:-4px;right:-4px;width:14px;height:14px;background:var(--accent);border-radius:3px;cursor:se-resize;z-index:3;display:flex;align-items:center;justify-content:center">
        <svg width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1 7L7 1M4 7L7 4M7 7L7 7" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg>
      </div>
    </div>`;
  }).join('');
}


function openScreenshot(idx) {
  const t = modalSession[modalActiveIdx];
  const src = t.screenshots?.[idx];
  if (!src) return;
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:zoom-out';
  overlay.onclick = () => overlay.remove();
  const img = document.createElement('img');
  img.src = src;
  img.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(0,0,0,.5)';
  overlay.appendChild(img);
  document.body.appendChild(overlay);
}

function liveUpdateTab(outcomeVal) {
  modalSession[modalActiveIdx].outcome = outcomeVal;
  const tabs = document.getElementById('trade-tabs');
  if (!tabs) return;
  const tab = tabs.children[modalActiveIdx];
  if (!tab) return;
  tab.classList.remove('tab-win','tab-loss','tab-be');
  tab.classList.add(outcomeVal==='Loss'?'tab-loss':outcomeVal==='BE'?'tab-be':'tab-win');
}

function saveAllTrades() {
  snapshotCurrentTab();
  let saved = 0;
  modalSession.forEach(t => {
    const trade = {
      id: t.id || data.nextId++,
      date: t.date,
      symbol: t.symbol,
      direction: t.direction,
      status: t.status,
      entry: t.entry ?? null,
      exit: t.exit ?? null,
      size: t.size || 1,
      pnl: t.pnl || 0,
      rr: t.rr || null,
      outcome: t.outcome,
      notes: t.notes || '',
      tags: t.tags || [],
      rules: t.rules || data.settings.rules.map(()=>false),
      screenshots: t.screenshots || [],
      screenshotSizes: t.screenshotSizes || [],
    };
    if (t.id) {
      const i = data.trades.findIndex(x => x.id === t.id);
      if (i >= 0) data.trades[i] = trade;
    } else {
      data.trades.push(trade);
    }
    saved++;
  });
  save();
  closeModal();
  render();
  toast(saved > 1 ? `${saved} trades saved` : modalMode === 'edit' ? 'Trade updated' : 'Trade saved');
}

function deleteTradeFromModal(id) {
  data.trades = data.trades.filter(t => t.id !== id);
  // Remove from session too
  modalSession = modalSession.filter(t => t.id !== id);
  save();
  if (modalSession.length === 0) {
    closeModal();
    render();
    toast('Trade deleted');
  } else {
    modalActiveIdx = Math.min(modalActiveIdx, modalSession.length - 1);
    render();
    renderModal();
    toast('Trade deleted');
  }
}

function deleteTrade(id) {
  data.trades = data.trades.filter(t=>t.id!==id);
  save(); render(); toast('Trade deleted');
}

// ─── SETTINGS ACTIONS ─────────────────────────────────────────────────────────
function updateSetting(key, val) { data.settings[key]=val; save(); render(); }
function addRule() {
  const inp = document.getElementById('new-rule');
  if (!inp.value.trim()) return;
  data.settings.rules.push(inp.value.trim()); save(); render();
}
function removeRule(i) { data.settings.rules.splice(i,1); save(); render(); }
function addTag() {
  const inp = document.getElementById('new-tag');
  if (!inp.value.trim()) return;
  data.settings.tags.push(inp.value.trim()); save(); render();
}
function removeTag(i) { data.settings.tags.splice(i,1); save(); render(); }
function addInstrument() {
  const inp = document.getElementById('new-inst');
  if (!inp.value.trim()) return;
  data.settings.instruments.push(inp.value.trim().toUpperCase()); save(); render();
}
function removeInstrument(i) { data.settings.instruments.splice(i,1); save(); render(); }

function exportData() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='trade-journal-export.json'; a.click();
  URL.revokeObjectURL(url); toast('Data exported');
}
function importData(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.trades || !imported.settings) throw new Error('Invalid file');
      if (!confirm(`Import ${imported.trades.length} trades? This will replace current data.`)) return;
      data = imported; save(); render(); toast('Data imported');
    } catch { toast('Import failed — invalid file'); }
  };
  reader.readAsText(file);
  input.value = '';
}

function setFilter(tag) { filterTag = tag; render(); }
function setJournalView(v) {
  journalView = v;
  localStorage.setItem('tj_view', v);
  render();
}

function toast(msg) {
  const el = document.createElement('div'); el.className='toast'; el.textContent=msg;
  document.body.appendChild(el); setTimeout(()=>el.remove(), 2500);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
renderAcctBtn();
</script>
</body>
</html>
